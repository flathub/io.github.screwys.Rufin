name: Update generated sources

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - io.github.screwys.Rufin.json

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: generated-sources-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  cargo-sources:
    if: >-
      github.repository == 'flathub/io.github.screwys.Rufin' &&
      github.event.pull_request.user.login == 'flathubbot' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Check out Flathub pull request
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Resolve Rufin source
        id: source
        run: |
          set -euo pipefail
          source="$(
            jq -c '
              .modules[]
              | select(.name == "rufin")
              | .sources[]
              | select(type == "object")
              | select(.type == "git" and .url == "https://github.com/screwys/Rufin.git")
            ' io.github.screwys.Rufin.json
          )"
          tag="$(jq -r '.tag // empty' <<< "$source")"
          commit="$(jq -r '.commit // empty' <<< "$source")"

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Unexpected Rufin tag: $tag" >&2
            exit 1
          fi
          if [[ ! "$commit" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Unexpected Rufin commit: $commit" >&2
            exit 1
          fi

          {
            echo "tag=$tag"
            echo "commit=$commit"
          } >> "$GITHUB_OUTPUT"

      - name: Check out Rufin source
        run: |
          set -euo pipefail
          git clone --filter=blob:none --no-checkout https://github.com/screwys/Rufin.git upstream
          git -C upstream fetch --depth=1 origin "refs/tags/${{ steps.source.outputs.tag }}:refs/tags/${{ steps.source.outputs.tag }}"
          git -C upstream checkout --detach "${{ steps.source.outputs.tag }}"
          actual="$(git -C upstream rev-parse HEAD)"
          test "$actual" = "${{ steps.source.outputs.commit }}"

      - name: Regenerate Cargo sources
        run: |
          set -euo pipefail
          awk '
          function quoted_value(line, value) {
              value = line
              sub(/^[^=]+ = "/, "", value)
              sub(/"$/, "", value)
              return value
          }

          function emit_crate(name, version, checksum, dest) {
              dest = "cargo/vendor/" name "-" version
              print "    {"
              print "        \"type\": \"archive\","
              print "        \"archive-type\": \"tar-gzip\","
              print "        \"url\": \"https://static.crates.io/crates/" name "/" name "-" version ".crate\","
              print "        \"sha256\": \"" checksum "\","
              print "        \"dest\": \"" dest "\""
              print "    },"
              print "    {"
              print "        \"type\": \"inline\","
              print "        \"contents\": \"{\\\"package\\\": \\\"" checksum "\\\", \\\"files\\\": {}}\","
              print "        \"dest\": \"" dest "\","
              print "        \"dest-filename\": \".cargo-checksum.json\""
              print "    },"
              emitted = 1
          }

          function flush_package() {
              if (source == "registry+https://github.com/rust-lang/crates.io-index") {
                  if (checksum == "") {
                      print "missing checksum for " name " " version > "/dev/stderr"
                      exit 1
                  }
                  key = name "\t" version "\t" checksum
                  if (!(key in seen)) {
                      seen[key] = 1
                      emit_crate(name, version, checksum)
                  }
              }
              name = ""
              version = ""
              source = ""
              checksum = ""
          }

          BEGIN {
              print "["
          }

          /^\[\[package\]\]/ {
              if (in_package) {
                  flush_package()
              }
              in_package = 1
              next
          }

          in_package && /^name = "/ {
              name = quoted_value($0)
              next
          }

          in_package && /^version = "/ {
              version = quoted_value($0)
              next
          }

          in_package && /^source = "/ {
              source = quoted_value($0)
              next
          }

          in_package && /^checksum = "/ {
              checksum = quoted_value($0)
              next
          }

          END {
              if (in_package) {
                  flush_package()
              }
              print "    {"
              print "        \"type\": \"inline\","
              print "        \"contents\": \"[source.vendored-sources]\\ndirectory = \\\"cargo/vendor\\\"\\n\\n[source.crates-io]\\nreplace-with = \\\"vendored-sources\\\"\\n\","
              print "        \"dest\": \"cargo\","
              print "        \"dest-filename\": \"config\""
              print "    }"
              print "]"
          }
          ' upstream/Cargo.lock > cargo-sources.json
          jq empty cargo-sources.json

      - name: Commit generated sources
        run: |
          set -euo pipefail
          if git diff --quiet -- cargo-sources.json; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cargo-sources.json
          git commit -m "chore: update generated Cargo sources"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
